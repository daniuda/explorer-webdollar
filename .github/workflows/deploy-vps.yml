name: Deploy Frontend To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Archive dist
        run: tar -czf explorer-webdollar-dist.tar.gz dist

      - name: Upload archive to VPS /tmp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: explorer-webdollar-dist.tar.gz
          target: /tmp/

      - name: Extract archive and publish with sudo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            sudo mkdir -p /var/www/explorer-webdollar
            sudo rm -rf /var/www/explorer-webdollar/*
            sudo tar -xzf /tmp/explorer-webdollar-dist.tar.gz -C /tmp
            sudo cp -r /tmp/dist/* /var/www/explorer-webdollar/
            sudo rm -rf /tmp/dist /tmp/explorer-webdollar-dist.tar.gz
            sudo nginx -t
            sudo systemctl reload nginx
